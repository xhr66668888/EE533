<svg xmlns="http://www.w3.org/2000/svg" width="760" height="410" viewBox="0 0 760 410">
  <style>
    .wire { stroke: #111; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .thin { stroke: #111; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .text { font-family: Arial, Helvetica, sans-serif; font-size: 22px; fill: #111; }
    .small { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #111; }
  </style>

  <!-- VDD rails -->
  <line class="wire" x1="270" y1="35" x2="350" y2="35"/>
  <text class="text" x="282" y="28">VDD</text>
  <line class="wire" x1="520" y1="35" x2="600" y2="35"/>
  <text class="text" x="532" y="28">VDD</text>

  <!-- RD -->
  <line class="wire" x1="310" y1="35" x2="310" y2="75"/>
  <polyline class="thin" points="310,75 292,88 328,105 292,122 328,139 292,156 328,173 310,186"/>
  <line class="wire" x1="310" y1="186" x2="310" y2="205"/>
  <text class="text" x="230" y="135">R_D</text>
  <text class="small" x="326" y="88">I_D</text>

  <!-- NMOS common-source stage -->
  <line class="wire" x1="310" y1="205" x2="310" y2="270"/>
  <line class="wire" x1="260" y1="218" x2="260" y2="258"/>
  <line class="wire" x1="272" y1="220" x2="310" y2="220"/>
  <line class="wire" x1="272" y1="256" x2="310" y2="256"/>
  <line class="wire" x1="200" y1="238" x2="260" y2="238"/>
  <line class="wire" x1="310" y1="270" x2="310" y2="314"/>
  <line class="wire" x1="285" y1="314" x2="335" y2="314"/>
  <line class="wire" x1="295" y1="327" x2="325" y2="327"/>
  <line class="wire" x1="305" y1="340" x2="315" y2="340"/>
  <text class="text" x="222" y="292">M1</text>
  <text class="text" x="97" y="246">V_in</text>
  <circle cx="310" cy="205" r="5" fill="#111"/>
  <text class="text" x="322" y="199">V1</text>

  <!-- Vin input -->
  <line class="wire" x1="135" y1="238" x2="200" y2="238"/>
  <circle cx="135" cy="238" r="8" fill="#fff" stroke="#111" stroke-width="3"/>

  <!-- Connection to BJT base -->
  <line class="wire" x1="310" y1="205" x2="500" y2="205"/>

  <!-- NPN emitter follower -->
  <circle cx="555" cy="205" r="45" fill="#fff" stroke="#111" stroke-width="3"/>
  <line class="wire" x1="500" y1="205" x2="525" y2="205"/>
  <line class="wire" x1="525" y1="175" x2="525" y2="235"/>
  <line class="wire" x1="525" y1="190" x2="555" y2="160"/>
  <line class="wire" x1="525" y1="220" x2="555" y2="250"/>
  <polygon points="552,247 543,231 536,238" fill="#111"/>
  <line class="wire" x1="555" y1="160" x2="555" y2="35"/>
  <line class="wire" x1="555" y1="250" x2="555" y2="278"/>
  <text class="text" x="610" y="206">Q1</text>
  <text class="small" x="570" y="72">I_C</text>

  <!-- Output node -->
  <circle cx="555" cy="278" r="5" fill="#111"/>
  <line class="wire" x1="555" y1="278" x2="690" y2="278"/>
  <circle cx="690" cy="278" r="8" fill="#fff" stroke="#111" stroke-width="3"/>
  <text class="text" x="704" y="286">V_out</text>

  <!-- RE -->
  <line class="wire" x1="555" y1="278" x2="555" y2="298"/>
  <polyline class="thin" points="555,298 537,311 573,328 537,345 573,362 555,376"/>
  <line class="wire" x1="555" y1="376" x2="555" y2="390"/>
  <line class="wire" x1="530" y1="390" x2="580" y2="390"/>
  <text class="text" x="495" y="342">R_E</text>

  <!-- CL -->
  <line class="wire" x1="635" y1="278" x2="635" y2="316"/>
  <line class="wire" x1="610" y1="316" x2="660" y2="316"/>
  <line class="wire" x1="610" y1="330" x2="660" y2="330"/>
  <line class="wire" x1="635" y1="330" x2="635" y2="390"/>
  <line class="wire" x1="610" y1="390" x2="660" y2="390"/>
  <text class="text" x="665" y="331">C_L</text>
</svg>
